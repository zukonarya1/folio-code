name: Deploy to Development

on:
  push:
    branches:
      - develop
    paths:
      - 'infrastructure/cdk/**'
      - 'lambda-functions/**'
      - 'frontend/**'
  workflow_dispatch:
    inputs:
      force-deploy:
        description: 'Force deployment even if tests fail'
        required: false
        type: boolean
        default: false

env:
  NODE_VERSION: '20.x'
  AWS_REGION: 'us-west-2'
  ENVIRONMENT: 'dev'
  CDK_CONTEXT: '--context environment=dev'
  STACK_PREFIX: 'dev-'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: infrastructure/cdk/package-lock.json

      - name: Install CDK dependencies
        working-directory: infrastructure/cdk
        run: npm ci

      - name: Build CDK
        working-directory: infrastructure/cdk
        run: npm run build

      - name: Run CDK tests
        working-directory: infrastructure/cdk
        run: npm test || ${{ github.event.inputs.force-deploy == 'true' }}

  deploy:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: test
    permissions:
      id-token: write
      contents: read
    environment:
      name: development
      url: https://console.aws.amazon.com/cloudformation

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: infrastructure/cdk/package-lock.json

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-Dev-${{ github.run_id }}

      - name: Install CDK CLI
        run: npm install -g aws-cdk

      - name: Install CDK dependencies
        working-directory: infrastructure/cdk
        run: npm ci

      - name: Build CDK
        working-directory: infrastructure/cdk
        run: npm run build

      - name: CDK Bootstrap (if needed)
        working-directory: infrastructure/cdk
        run: npx cdk bootstrap

      - name: CDK Deploy
        working-directory: infrastructure/cdk
        run: |
          npx cdk deploy --all \
            ${{ env.CDK_CONTEXT }} \
            --require-approval never \
            --outputs-file cdk-outputs.json

      - name: Save deployment outputs
        uses: actions/upload-artifact@v4
        with:
          name: cdk-outputs-dev
          path: infrastructure/cdk/cdk-outputs.json
          retention-days: 30

      - name: Deployment summary
        run: |
          echo "### Deployment Summary :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** Development" >> $GITHUB_STEP_SUMMARY
          echo "**Region:** ${{ env.AWS_REGION }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed at:** $(date -u)" >> $GITHUB_STEP_SUMMARY

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-Dev-Frontend-${{ github.run_id }}

      - name: Download deployment outputs
        uses: actions/download-artifact@v4
        with:
          name: cdk-outputs-dev

      - name: Extract environment variables from CDK outputs
        run: |
          AUTH_STACK="${{ env.STACK_PREFIX }}PdfConversationAuthStack"
          INFRA_STACK="${{ env.STACK_PREFIX }}PdfConversationInfraStack"
          FRONTEND_STACK="${{ env.STACK_PREFIX }}PdfConversationFrontendStack"

          echo "REACT_APP_USER_POOL_ID=$(python3 -c "import json; d=json.load(open('cdk-outputs.json')); print(d['${AUTH_STACK}']['UserPoolId'])")" >> $GITHUB_ENV
          echo "REACT_APP_USER_POOL_CLIENT_ID=$(python3 -c "import json; d=json.load(open('cdk-outputs.json')); print(d['${AUTH_STACK}']['UserPoolClientId'])")" >> $GITHUB_ENV
          echo "REACT_APP_IDENTITY_POOL_ID=$(python3 -c "import json; d=json.load(open('cdk-outputs.json')); print(d['${AUTH_STACK}']['IdentityPoolId'])")" >> $GITHUB_ENV
          echo "REACT_APP_API_ENDPOINT=$(python3 -c "import json; d=json.load(open('cdk-outputs.json')); print(d['${AUTH_STACK}']['ApiEndpoint'].rstrip('/'))")" >> $GITHUB_ENV
          echo "REACT_APP_PROCESSING_BUCKET=$(python3 -c "import json; d=json.load(open('cdk-outputs.json')); print(d['${INFRA_STACK}']['ProcessingBucketName'])")" >> $GITHUB_ENV
          echo "REACT_APP_USER_POOL_DOMAIN=$(python3 -c "import json; d=json.load(open('cdk-outputs.json')); print(d['${AUTH_STACK}']['UserPoolDomainOutput'])")" >> $GITHUB_ENV
          echo "REACT_APP_AWS_REGION=${{ env.AWS_REGION }}" >> $GITHUB_ENV

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Deploy to S3
        run: |
          FRONTEND_STACK="${{ env.STACK_PREFIX }}PdfConversationFrontendStack"
          BUCKET=$(python3 -c "import json; d=json.load(open('cdk-outputs.json')); print(d['${FRONTEND_STACK}']['FrontendBucketName'])")
          aws s3 sync frontend/build/ s3://$BUCKET --delete

      - name: Invalidate CloudFront cache
        run: |
          FRONTEND_STACK="${{ env.STACK_PREFIX }}PdfConversationFrontendStack"
          DIST_ID=$(python3 -c "import json; d=json.load(open('cdk-outputs.json')); print(d['${FRONTEND_STACK}']['CloudFrontDistributionId'])")
          aws cloudfront create-invalidation --distribution-id $DIST_ID --paths "/*"

  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy, deploy-frontend]
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download deployment outputs
        uses: actions/download-artifact@v4
        with:
          name: cdk-outputs-dev

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-Dev-SmokeTest-${{ github.run_id }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test dependencies
        run: pip install pytest requests boto3

      - name: Extract API config from CDK outputs
        run: |
          AUTH_STACK="${{ env.STACK_PREFIX }}PdfConversationAuthStack"
          echo "API_URL=$(python3 -c "import json; d=json.load(open('cdk-outputs.json')); print(d['${AUTH_STACK}']['ApiEndpoint'].rstrip('/'))")" >> $GITHUB_ENV
          echo "COGNITO_USER_POOL_ID=$(python3 -c "import json; d=json.load(open('cdk-outputs.json')); print(d['${AUTH_STACK}']['UserPoolId'])")" >> $GITHUB_ENV
          echo "COGNITO_CLIENT_ID=$(python3 -c "import json; d=json.load(open('cdk-outputs.json')); print(d['${AUTH_STACK}']['UserPoolClientId'])")" >> $GITHUB_ENV

      - name: Run smoke tests
        env:
          SMOKE_TEST_USER: ${{ secrets.SMOKE_TEST_USER }}
          SMOKE_TEST_PASS: ${{ secrets.SMOKE_TEST_PASS }}
          SMOKE_TEST_DOC_ID: ${{ secrets.SMOKE_TEST_DOC_ID }}
          ENVIRONMENT: dev
        run: pytest tests/integration/smoke_test.py -v

      - name: Smoke test summary
        if: always()
        run: |
          echo "### Dev Smoke Test :test_tube:" >> $GITHUB_STEP_SUMMARY
          echo "Branch: ${{ github.ref_name }} | Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
